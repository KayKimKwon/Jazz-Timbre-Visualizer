<!DOCTYPE html>
<html>
<head>
  <title>Jazz Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Jazz <em>Timbre</em> Spectrum</h1>


    <div id="styleTab" class="style-tabs"></div>

    <button id="comparisonBtn">Add Comparison</button>
    <button id="closeComparison" style="display:none"> Close Comparison </button>
    <!-- Select a style above to begin -->

    <div id="canvases">
        <div class="canvas-slot">
            <div class="canvas-label" id="label1"></div>
            <canvas id="canvas1"></canvas>
            <canvas class="ruler-canvas" id="ruler1" height="25"></canvas>
        </div>
        <div class="canvas-slot" id="slot2Container" style="display:none">
            <div class="canvas-label" id="label2"></div>
            <canvas id="canvas2"></canvas>
            <canvas class="ruler-canvas" id="ruler2" height="25"></canvas>
        </div>
    </div>


    <div id="legend">
        <div class="legend-item"><span class="legend-dot" style="background:#e05c5c"></span>Sub Bass (20-60Hz)</div>
        <div class="legend-item"><span class="legend-dot" style="background:#e08a3c"></span>Bass / Double Bass (60-250 Hz)</div>
        <div class="legend-item"><span class="legend-dot" style="background:#e0c84c"></span> Low Mid / Trombone (250-500 Hz)</div>
        <div class="legend-item"><span class="legend-dot" style="background:#5ce07a"></span> Mid / Trumpet / Sax (500-2k Hz)</div>
        <div class="legend-item"><span class="legend-dot" style="background:#5cbde0"></span>High Mid / Harmonics (2k-6k Hz)</div>
        <div class="legend-item"><span class="legend-dot" style="background:#a07de0"></span>Air / Cymbals (6k+ Hz)</div>
    </div>

  <button id="stopBtn"> Stop Playing </button>

  <script src="script.js"></script>
</body>
</html>
